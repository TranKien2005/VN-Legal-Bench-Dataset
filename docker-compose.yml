services:
  postgres:
    image: postgres:16-alpine
    container_name: vn_legal_bench_db
    environment:
      POSTGRES_DB: ${DB_NAME:-vn_legal_bench}
      POSTGRES_USER: ${DB_USER:-legal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-legal123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: vn_legal_bench_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
